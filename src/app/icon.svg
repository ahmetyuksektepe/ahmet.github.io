<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Arka plan (Sitenin moduna göre transparan da yapabilirsin, şimdilik koyu tema) -->
  <rect width="100" height="100" rx="20" fill="#0F172A"/>
  
  <!-- Logo Grubu (Merkezlenmiş) -->
  <g transform="translate(10, 10)">
    <!-- Sol bacak ve Tepe (A harfi etkisi) -->
    <path d="M 15 60 L 40 20 L 50 36" stroke="#6366F1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Sağ bacak ve Çatal (Y harfi etkisi) -->
    <path d="M 40 20 L 65 60" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 40 45 L 40 65" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
